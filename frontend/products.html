<!DOCTYPE html>
<html>
<head>
<title>Products</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h2>Write Review</h2>

<select id="rating">

<option value="5">⭐⭐⭐⭐⭐</option>
<option value="4">⭐⭐⭐⭐</option>
<option value="3">⭐⭐⭐</option>
<option value="2">⭐⭐</option>
<option value="1">⭐</option>

</select>

<br><br>

<textarea
id="review"
placeholder="Write Review">
</textarea>

<br><br>

<button onclick="submitReview()">
Submit Review
</button>

<hr>

<h2>Customer Reviews</h2>

<div id="reviews"></div>

<script>

async function submitReview(){

    const product =
    document.getElementById(
    "productName"
    ).innerText;

    const user =
    localStorage.getItem("name");

    const rating =
    document.getElementById(
    "rating"
    ).value;

    const review =
    document.getElementById(
    "review"
    ).value;

    const response =
    await fetch(
    "http://localhost:5000/review",
    {
        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:JSON.stringify({

            product,
            user,
            rating,
            review

        })
    });

    const data =
    await response.json();

    alert(data.message);

    loadReviews();
}
</script>

</ul>

</body>
</html>
