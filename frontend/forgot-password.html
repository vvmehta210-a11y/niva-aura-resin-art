<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
</head>
<body>

<h1>Forgot Password</h1>

<input
type="email"
id="email"
placeholder="Enter Registered Email">

<br><br>

<button onclick="sendOTP()">
Send OTP
</button>

<br><br>

<input
type="text"
id="otp"
placeholder="Enter OTP">

<br><br>

<input
type="password"
id="newPassword"
placeholder="New Password">

<br><br>

<button onclick="resetPassword()">
Reset Password
</button>

<script>

async function sendOTP(){

    const email =
    document.getElementById("email").value;

    const response =
    await fetch(
        "https://niva-aura-resin-art.onrender.com/forgot-password",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({ email })
        }
    );

    const data =
    await response.json();

    alert(data.message);
}

async function resetPassword(){

    const email =
    document.getElementById("email").value;

    const otp =
    document.getElementById("otp").value;

    const newPassword =
    document.getElementById("newPassword").value;

    const response =
    await fetch(
        "https://niva-aura-resin-art.onrender.com/reset-password",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                email,
                otp,
                newPassword
            })
        }
    );

    const data =
    await response.json();

    alert(data.message);

    if(data.message ===
       "Password Updated Successfully"){

        window.location.href =
        "login.html";
    }
}

</script>

</body>
</html>
