<!DOCTYPE html>
<html>
<head>
    <title>Checkout - Niva Aura Resin Art</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f5f5f5;
            margin:0;
            padding:0;
        }

        .container{
            width:500px;
            margin:40px auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
        }

        input, textarea{
            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:15px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            background:black;
            color:white;
            border:none;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#333;
        }
    </style>

</head>
<body>

<div class="container">

    <h1>Checkout</h1>

    <form id="checkoutForm">

        <input
        type="text"
        id="customerName"
        placeholder="Full Name"
        required>

        <input
        type="text"
        id="mobile"
        placeholder="Mobile Number"
        required>

        <input
        type="email"
        id="email"
        placeholder="Email Address"
        required>

        <textarea
        id="address"
        placeholder="Delivery Address"
        rows="4"
        required></textarea>

        <input
        type="text"
        id="city"
        placeholder="City"
        required>

        <input
        type="text"
        id="pincode"
        placeholder="Pincode"
        required>

        <button type="submit">
            Proceed To Payment
        </button>

    </form>

</div>

<script>

document.getElementById("checkoutForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    let customer = {

        name:
        document.getElementById("customerName").value,

        mobile:
        document.getElementById("mobile").value,

        email:
        document.getElementById("email").value,

        address:
        document.getElementById("address").value,

        city:
        document.getElementById("city").value,

        pincode:
        document.getElementById("pincode").value

    };

    localStorage.setItem(
        "customer",
        JSON.stringify(customer)
    );

    alert("Address Saved Successfully");

    window.location.href =
    "payment.html";

});
</script>


</body>
</html>
