<!DOCTYPE html>
<html>
<head>
    <title>Niva Aura Resin Art - Login</title>

    <style>

    body{
        font-family:Arial,sans-serif;
        background:#f5f5f5;
        text-align:center;
        padding-top:50px;
    }

    .login-box{
        background:white;
        width:350px;
        margin:auto;
        padding:30px;
        border-radius:10px;
        box-shadow:0 0 10px rgba(0,0,0,0.2);
    }

    input{
        width:90%;
        padding:10px;
        margin:10px 0;
    }

    button{
        width:95%;
        padding:10px;
        background:black;
        color:white;
        border:none;
        cursor:pointer;
    }

    button:hover{
        opacity:0.9;
    }

    a{
        text-decoration:none;
    }

    </style>

</head>
<body>

<div class="login-box">

    <h1>Niva Aura Resin Art</h1>

    <h2>User Login</h2>

    <input
    type="email"
    id="email"
    placeholder="Enter Email">

    <input
    type="password"
    id="password"
    placeholder="Enter Password">

    <br>

    <input
    type="checkbox"
    onclick="togglePassword()">
    Show Password

    <br><br>

    <button onclick="login()">
        Login
    </button>

    <br><br>

    <a href="forgot-password.html">
        Forgot Password?
    </a>

    <br><br>

    Don't have an account?

    <a href="singup.html">singup</a>

</div>

<script>

function togglePassword(){

    let pass =
    document.getElementById("password");

    if(pass.type === "password"){

        pass.type = "text";

    }else{

        pass.type = "password";
    }
}
async function login(){

    let email =
    document.getElementById("email").value;

    let password =
    document.getElementById("password").value;

    try{

        const response =
        await fetch(
        "https://niva-aura-resin-art.onrender.com/login",
        {
            method:"POST",

            headers:{
                "Content-Type":
                "application/json"
            },

            body:JSON.stringify({
                email,
                password
            })
        });

        const data =
        await response.json();

        if(response.ok){

            localStorage.setItem(
                "token",
                data.token
            );

            localStorage.setItem(
                "name",
                data.name
            );

            localStorage.setItem(
                "email",
                email
            );

            localStorage.setItem(
                "userLoggedIn",
                "true"
            );

            alert(
                "Login Successful"
            );

            window.location.href =
            "account.html";

        }else{

            alert(data.message);
        }

    }catch(error){

        alert(
        "Server Connection Error"
        );

        console.log(error);
    }
}
</script>

</body>
</html>
